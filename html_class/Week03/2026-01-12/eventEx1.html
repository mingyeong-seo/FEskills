<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        height: 100px;
        width: 25%;
        float: left;
      }
    </style>
  </head>
  <body>
    <script>
      // 16번의 루프를 돌면서 다음과 같이 코드를 완성하세요.
      // 동적으로 div를 각각 생성하고, background-color를 red로 설정하세요.
      // 이후 생성된 div는 body 하위에 추가되도록 등록(append) 시키세요.
      // 결과는 페이지가 로딩되면, 전체가 빨간색으로 도배되어야 한다.

      for (let i = 0; i < 16; i++) {
        let divRed = document.createElement("div");
        divRed.style.backgroundColor = "red";
        let target = document.querySelector("body").appendChild(divRed);
      }

      // random 함수를 정의하세요, 파라미터 받아서 해당 숫자 범위 만큼의 랜덤값을 리턴하도록 정의하세요.
      function random(number) {
        return Math.random() * number;
      }

      function bgChange() {
        let rdmColor =
          "rgb(" + random(255) + "," + random(255) + "," + random(255) + ")";
        return rdmColor;
      }

      // 모든 div 요소의 리스트를 divs라는 const 변수에 담으세요.
      const divs = document.querySelectorAll("div");
      // console.log(divs);
      // 이벤트를 등록하고 이를 핸들러에 연결하자
      for (let i = 0; i < divs.length; i++) {
        divs[i].addEventListener("click", (e) => {
          e.target.style.backgroundColor = bgChange();
        });

        // divs[i].onclick = (e) => {
        //   console.log(e.target);
        //   e.target.style.backgroundColor = bgChange();
        //
      }
    </script>
  </body>
</html>
