<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flag</title>
  </head>
  <body>
    <script>
      let text = "Visit School";
      // 검색할 패턴 생성
      // /찾을문자열/플래그
      let patter = /is/g;
      //값이 존재하면 배열로 반환, 아니면 null
      text.match(patter);

      text = "aaaabb";
      //() 그룹 한정자
      patter = /(aa)(bb)/d;
      text.match(patter);
      text = "aaaabb";
      patter = /A/i;
      text.search(patter);
      // search()는 주어진 문자열이 처음 일치하는 인덱스를 반환, 없으면 -1
      text.replace(/B/i);
      text.replace(/B/i, "c");
      text.replace(/B/gi, "c");

      // 위 문자열에서 red or green or blue 를 찾아서 배열로 리턴시키려함.
      text = "Black, white, red, green, blue, yellow";
      let res = text.match(/red|green|blue/g);
      res;

      // []의 의미: 괄호 내의 문자를 전역적으로 검색함. 필요에 따라서 -를 지정해서 범위를 지정할 수 있음.
      text = "Hello World";
      patter = /[HW]/g;
      text.match(patter);
      // 제일 많이 사용한다.
      patter = /[A-Z]/g; // 대문자가 존재하는가?
      text.match(patter);
      text = "123456789";
      patter = /[1-4]/g;
      text.match(patter);

      // 존재하는지만 참조
      // ..은 문자 2개
      text = "Regexp Recording..";
      patter = /R../g;
      patter.test(text); // true or false 리턴
      //뭔지 뽑아내고 싶으면
      text.match(patter);

      // 수량 한정자
      // {n, m}은 n개 또는 m개
      // {n}은 뒤에 n개의 문자
      // {1, }은 1개 이상의 문자가 존재 하는지...
      text = "The fear of th LOAD is the bigging of Knowledge.";
      text.match(/t.{1,2}/gi);
      // t로 시작하고 뒤에 문자 4개인 단어들을 찾아보기
      text.match(/t.{4}/gi);
      // of of 가 나오도록 찾아보기
      text.match(/of{1,}/g);
      text.match(/b.+/g);
      // Th, th, th, t로 시작하고 뒤에 문자가 0개 이거나 1개 인 문자열만 찾기
      text.match(/t.?/gi);
      // t로 시작하는 두글자 또는 o로 시작하는 두글자를 찾기
      text.match(/t.| o./g);
      patter = /\b[a-z]\b.{3}/g; //단어 경계

      text = "My Name is Jason AND  age is 999";
      // [A-Za-z] 영문자 전체
      // ^ 제외 문자
      // [A-Za-z\s] 공백과 영문자 전체
      // [A-Za-z\s]+1
      // [^A-Za-z\s]+ 공백, 알파벳을 제외한 1개 이상의 문자를 추출하라는 의미

      let now = new Date()
        .toLocaleString()
        .replaceAll(".", "")
        .replaceAll(":", "");
      now = now.replace(/ /g, "");
      // \d+ 하나 이상의 숫자
      // [a-z]+ 하나 이상이 소문자
      // /^$ 시작부터 끝까지
      // 8~12자리의 알파벳 대소문자와 숫자의 조합인지 검사하세요. test()
      let id = "Mingyeong03";
      /^[A-Za-z0-9]{8,12}$/.test(id);
      //이메일 정규화 패턴
      /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    </script>
  </body>
</html>
