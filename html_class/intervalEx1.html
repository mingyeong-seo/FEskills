<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .go {
        color: green;
      }
      .stop {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="my_box">
      <h3>Hello World</h3>
    </div>
    <button id="start">Start</button>
    <button id="stop">Stop</button>

    <script>
      // interval ID 변수.. 이게 있어야 clear 시킬 수 있음
      // intervalID는 “타이머가 있냐 없냐를 판단하는 상태값
      let intervalID = null; // 아직 아무값도 할당 받은게 없다

      //
      function changeColor() {
        // if (!intervalID)는 “타이머가 없을 때만 새로 등록해서 중복을 막는 조건"
        if (!intervalID) {
          // intervalID가 비어있을 때(= 아직 타이머가 없을 때)만 setInterval을 실행해라
          intervalID = setInterval(flashText, 1000); // 1초에 한 번씩 flashText 함수 호출
        }
      }

      function stopChangeColor() {
        // interval을 clear 시킨다
        clearInterval(intervalID);
        intervalID = null;
      }

      // 작업을 수행할 함수 정의
      function flashText() {
        // 변경될 요소를 찾아서 클래스 변경해준다
        const element = document.getElementById("my_box");
        element.className = element.className == "go" ? "stop" : "go";
      }

      // 이벤트 등록
      document.getElementById("start").addEventListener("click", changeColor);
      document
        .getElementById("stop")
        .addEventListener("click", stopChangeColor);
    </script>
  </body>
</html>
