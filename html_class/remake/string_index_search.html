<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    1. string_index_search
    const str = 'I love cats. Cats are lovely. Cats everywhere.';

    - indexOf()로 첫 번째 'Cats'의 인덱스 출력
    - lastIndexOf()로 마지막 'Cats'의 인덱스 출력
    - 결과가 왜 다른지 주석으로 설명
    -->
    <script>
      const str = 'I love cats. Cats are lovely. Cats everywhere.';
      console.log(str.indexOf('Cats'));
      console.log(str.lastIndexOf('Cats'));

      // indexOf는 문자열 앞에서부터 탐색하고, ** 가장 먼저** 발견된 위치의 인덱스를 반환한다. 
      // lastIndexOf는 문자열 전체를 기준으로 ** 가장 마지막 **에 발견된 위치의 인덱스를 반환한다. 
    </script>
  </body>
</html>
