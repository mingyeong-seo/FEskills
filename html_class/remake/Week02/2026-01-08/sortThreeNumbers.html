<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    1.  sortThreeNumbers.html
    - 숫자 3개를 입력받는다.
    - 입력 순서와 상관없이 오름차순(작 → 중 → 큰)으로 출력한다.
    - 배열, sort() 사용 금지.
    - 조건문과 변수만 사용한다. 
    -->
    <script>
      let num1 = Number(prompt('첫번째 숫자 입력'));
      let num2 = Number(prompt('두번째 숫자 입력'));
      let num3 = Number(prompt('세번째 숫자 입력'));

      let temp = 0;
      // 5 3 1
      // 1단계: 확실하게 가장 큰 수(num3) 찾기
      if (num1 >= num2 && num1 >= num3) {
        temp = num1; // temp = 5
        num1 = num3; // num1 = 1
        num3 = temp; // num3 = 5
        // 1 5 3
      } else if (num2 >= num1 && num2 >= num3) {
        temp = num2; // temp = 5
        num2 = num3; // num2 = 3
        num3 = temp; // num3 = 5
      }
      // 2단계: 남은 num1, num2만 비교해서 정렬
      if (num1 >= num2) {
        temp = num1;
        num1 = num2;
        num2 = temp;
      }
      console.log(num1, num2, num3);
    </script>
  </body>
</html>
