<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    4.  asciiClassifier.html
    - 0~127 사이의 숫자를 입력받는다.
    - 범위를 벗어나거나 숫자가 아니면 프로그램을 종료한다.
    - 입력값을 이중 하나로 분류해 출력한다.(특수문자, 숫자, 대문자 알파벳, 소문자 알파벳)
    -->
    <script>
      let num = Number(prompt('0~127 사이의 숫자 입력'));

      if (num < 0 || num > 127 || Number.isNaN(num)) {
        console.log('잘못된 입력');
      } else if (num >= 48 && num <= 57) {
        console.log('숫자');
      } else if (num >= 65 && num <= 90) {
        console.log('대문자 알파벳');
      } else if (num >= 97 && num <= 122) {
        console.log('소문자 알파벳');
      } else {
        console.log('특수문자');
      }
    </script>
  </body>
</html>
