<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    2.  sumBetweenTwoNumbers_temp.html
    - 숫자 2개를 입력받는다.
    - 두 수 중 작은 수부터 큰 수까지의 합을 구한다.
    - temp 변수를 사용해 값을 교환한 뒤 for문으로 합을 계산한다.
    -->
    <script>
      let num1 = Number(prompt('첫번째 숫자 입력'));
      let num2 = Number(prompt('두번째 숫자 입력'));
      let temp = 0;
      if (num1 >= num2) {
        temp = num1;
        num1 = num2;
        num2 = temp;
      }

      let sum = 0;

      for (let i = num1; i <= num2; i++) {
        sum += i;
      }
      console.log(sum);
    </script>
  </body>
</html>
