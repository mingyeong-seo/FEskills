<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if~else 실습2</title>
  </head>
  <body>
    <script>
      let num = Number(prompt('숫자 한 개 입력하세요.'));

      if (num > 0) {
        alert('1');
      } else if (num < 0) {
        alert('-1');
      } else {
        alert('0');
      }
    </script>
  </body>
</html>
