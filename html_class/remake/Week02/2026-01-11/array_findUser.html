<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배열</title>
  </head>
  <body>
    <!-- 파일명: array_findUser.html -->
    <!--
문제:
- users 배열을 만든다 (id, name 포함)
- id가 3인 user를 찾는다
- 찾은 user의 name을 출력한다

조건:
- find() 사용
-->

    <script>
      const users = [
        { id: 1, name: 'A' },
        { id: 2, name: 'B' },
        { id: 3, name: 'C' },
      ];

      let findWho = users.find((user) => user.id === 3);
      console.log(findWho.name);
      // 기억할 포인트
      // 1. const 변수는 다시 대입할 수 없다
      // 2. find()는 객체를 직접 반환한다
      // 3. new Object()는 여기서 쓸 이유가 없다
      // 4. find 결과는 undefined일 수 있다

      // 기억할 포인트
      // 1. if(x)는 x === true를 보는 게 아니다
      // 2. Boolean(x) 결과를 본다
      // 3. 객체는 항상 truthy
      // 4. find() 결과가 있으면 if 통과, 없으면 undefined
    </script>
  </body>
</html>
