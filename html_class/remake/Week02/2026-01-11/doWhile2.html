<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>do~while 실습1</title>
  </head>
  <body>
    <script>
      for (let i = 2; i <= 10; i++) {
        if (i % 2 == 0) {
          console.log(i);
        }
      }
    </script>
