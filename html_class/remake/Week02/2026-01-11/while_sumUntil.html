<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>while 반복문</title>
  </head>
  <body>
    <!-- 파일명: while_sumUntil.html -->
    <!--
문제:
- prompt로 숫자를 계속 입력받는다
- 숫자를 누적해서 합산한다
- 0을 입력하면 반복을 종료한다
- 최종 합계를 console.log로 출력한다

조건:
- while(true) 사용
- break 사용
-->
    <script>
      let sum = 0;
      while (true) {
        let num = Number(prompt('숫자 입력해라.'));

        if (Number.isNaN(num)) {
          continue;
        }

        if (num == 0) {
          break;
        }

        sum += num;
      }
      console.log(sum);

      // 기억할 포인트
      // 1. while(true)는 탈출 조건을 안에서 만든다
      // 2. break는 종료 조건에 쓴다
      // 3. 입력값은 항상 NaN 가능성을 먼저 체크한다
      // 4. 종료 조건을 먼저 처리하면 코드가 읽기 쉽다
      // 5. continue는 아래 코드를 전부 건너뛴다
      // 6. 반복문의 다음 반복으로 즉시 이동한다
      // 7. 그래서 while 맨 위부터 다시 실행된다
      // 8. 잘못된 입력을 버릴 때 쓰는 게 정석이다
    </script>
  </body>
</html>
