<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for 반복문</title>
  </head>
  <body>
    <!-- 파일명: for_evenOnly.html -->
    <!--
문제:
- 1부터 20까지 숫자를 반복한다
- 짝수만 console.log로 출력한다

조건:
- for문 사용
- if + continue 사용
-->

    <script>
      for (let i = 1; i <= 20; i++) {
        if (i % 2 != 0) {
          continue;
        }
        console.log(i);
      }

      // 기억할 포인트
      // 1. continue는 "이 반복을 건너뛴다"는 의미다
      // 2. 그래서 보통 '제외 조건'에 쓴다
      // 3. 반복문 맨 마지막 continue는 의미 없다
    </script>
  </body>
</html>
