<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>do~while 실습3</title>
  </head>
  <body>
    <script>
      /*
      소수(prime number)는 자신보다 작은 두 개의 자연수를 곱하여 만들 수 없는 1보다 큰 자연수이다. 

      다시 말해서 1과 그 수 자신 이외의 자연수로는 나눌 수 없는 자연수를 소수라고 부른다. 

      2부터 n까지의 숫자 중 소수만 출력해주는 코드를 작성해라. 
      n = 10이라면 결과는 2,3,5,7이 되어야한다. 
      주의: 작성한 코드는 임의의 숫자 n에 대해 동작해야 한다.
      */
      let n = Number(prompt('숫자 2이상 입력해라'));

      for (let i = 2; i <= n; i++) {
        let isPrime = true;
        for (let j = 2; j < i; j++) {
          if (i % j == 0) {
            isPrime = false;
            break;
          }
        }
        if (isPrime) alert(i); //소수
      }
    </script>
  </body>
</html>
