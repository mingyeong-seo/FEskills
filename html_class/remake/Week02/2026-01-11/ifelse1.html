<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if~else 실습1</title>
  </head>
  <body>
    <script>
      let answer = prompt('자바스크립트의 "공식" 이름은 무엇일까요?');
      if (answer == 'ECMAScript') {
        console.log('정답입니다!');
      } else {
        console.log('모르셨나요? 정답은 ECMAScript입니다!');
      }
    </script>
  </body>
</html>
