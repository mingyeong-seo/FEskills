    <script>
      let num1 = Number(prompt("첫번째 숫자 입력"));
      let num2 = Number(prompt("두번째 숫자 입력"));
      let num3 = Number(prompt("세번째 숫자 입력"));

      let temp;
      // 3 1 5  5 3 7
      // 1단계: 가장 작은 수를 c로 보낸다.
      if (num1 <= num3 && num1 <= num2) {
        temp = num1;
        num1 = num3;
        num3 = temp;
        // 5 1 3
      } else if (num2 <= num1 && num2 <= num3) {
        temp = num2;
        num2 = num3;
        num3 = temp;
        // 5 3 1 5 7 3
      }

      // 2단계: a, b만 정렬
      if (num1 <= num2) {
        temp = num1;
        num1 = num2;
        num2 = temp;
        // 7 5 3
      }
    </script>
