<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function checker() {
        let idbox = document.getElementById("exampleInputEmail1").value;

        if (idbox.length < 8 || idbox.length > 12) {
          alert("길이틀림");
          return; // 여기서 함수를 명시적으로 종료하라는 의미
        }

        let digiCnt = 0,
          upperChatCnt = 0; // 숫자와 대문자 카운터 변수
        for (let i = 0; i < idbox.length; i++) {
          let char = idbox.charCodeAt(i);

          if (char >= "0" && char <= "9") {
            // 숫자 여부 확인 하기
            digiCnt++;
          }

          if (char >= "A" && char <= "Z") {
            // 숫자 여부 확인 하기
            upperChatCnt++;
          }
        }
      }

      /*
              // while 해야 할것 같다.
              // ID는 반드시 8~12 길이어야 하고, 영문자와 숫자 하나 이상을 포함해야 합니다.
              // 이걸 검증하는 로직을 여기에 정의하세요.
              // 결과는 합당하면 ok, 아니면 뭐가 문제인지를 알럿을 이용해서 출력 시키세요.

              // 1단계: ID 길이 8~12 길이인지 if로 거르자. 길이 요건 만족이면 입력받은 아이디를 아스키 코드로 변환한다. 아니면 alert로 알려주기 continue

              //while (true) {
              let idLength = idbox.length;
              console.log("id 길이 확인용: " + idLength);

              let asciiList = ""; // 아스키 변환 후 담을 빈 문자열
              let idboxSlice;

              if (idLength >= 8 && idLength <= 12) {
                console.log("id 길이 조건 ok");
                idboxSlice = idbox.slice(0, idbox.length);
                console.log("slice한 값: " + idboxSlice);
                for (let i = 0; i < idbox.length; i++) {
                  //영대소문자
                  if (
                    (idboxSlice.charCodeAt(i) >= 65 &&
                      idboxSlice.charCodeAt(i) <= 90) ||
                    (idboxSlice.charCodeAt(i) >= 97 &&
                      idboxSlice.charCodeAt(i) <= 122)
                  ) {
                    console.log("대소문자 중 하나 있음");
                    if (
                      idboxSlice.charCodeAt(i) >= 48 &&
                      idboxSlice.charCodeAt(i) <= 57
                    ) {
                      alert("최종 ok");
                    }
                  }
                }
              } else {
                alert("id 길이 조건 no");
              }
            }
            // 2단계: 아스키 코드 변환 된 결과를 먼저 아스키 영문자 범위인지 확인 후 맞으면 다음 else if로(아스키 숫자 확인) 아니면 alert로 '영문자 하나 이상 없음' 출력 continue .
            // else if는 아스키 숫자 범위 확인 후 맞으면 alert로 'ok'출력 하고 break, 아니면  alert로 '숫자 하나 이상 없음'continue */
    </script>
  </head>
  <body>
    <!-- boots strap에서 form을 따서 붙여넣기 -->

    <form>
      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">ID</label>
        <input
          type="text"
          class="form-control"
          id="exampleInputEmail1"
          aria-describedby="emailHelp"
        />
        <div id="emailHelp" class="form-text">
          We'll never share your email with anyone else.
        </div>
      </div>
      <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="exampleInputPassword1"
        />
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1" />
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
      </div>
      <button type="button" class="btn btn-primary" onclick="checker()">
        Submit
      </button>
    </form>
  </body>
</html>
