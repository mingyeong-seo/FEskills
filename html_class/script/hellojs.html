    <script>

      let a = Number(prompt("숫자 1~ 9 중 첫번째 입력하세요"));
      let b = Number(prompt("숫자 1~ 9 중 두번째 입력하세요"));

      let sum = 0;

      console.log("첫번째 숫자는 " + a);
      console.log("두번째 숫자는 " + b);

      if (a >= b) {
        // 10 1
        let temp = a;
        a = b; // 1 1
        b = temp; //1 1
      }
      console.log(a + "부터 " + b + "까지의 합을 구하겠습니다.");

      for (let i = a; i <= b; i++) {
        sum += i;
      }
      console.log("합은 " + sum);
    </script>
