<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // while(조건식){조건의 결과가 true시 수행함. 구문 블락}
      // 일반적으로 무한 반복을 수행하다가 특정 조건이 만족되면 빠져나오는 (break) or 스킵(continue)하도록 사용합니다.

      let kor, eng, math, total, avg, counter;
      // 국영수 3과목의 점수를 입력 받아서 총점과 평균을 출력 하도록 합니다.
      // 단, 각 과목이 정수가 0~100점 사이여야만 다음 과목의 입력을 받을 수 있도록 합니다.
      total = 0;
      counter = 0;
      while (true) {
        total = 0;
        counter = 0;
        // 예외 처리를 안 함. counter
        kor = parseInt(prompt("국어 점수 입력"));
        if (kor >= 0 && kor <= 100) {
          counter++;
        } else {
          alert("새로고침해서 다시 실행");
          continue;
        }
        eng = parseInt(prompt("영어 점수 입력"));
        if (eng >= 0 && eng <= 100) {
          counter++;
        } else {
          alert("새로고침해서 다시 실행");
          continue;
        }

        math = parseInt(prompt("수학 점수 입력"));
        if (math >= 0 && math <= 100) {
          counter++;
        } else {
          alert("새로고침해서 다시 실행");
          continue;
        }

        if (counter == 3) {
          total = kor + eng + math;
          avg = total / 3;
          console.log("총점: " + total + " 평균: " + avg);
          break;
        }
      }
    </script>
